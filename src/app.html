<!doctype html>
<html lang="nl">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#0f1a14" />
		<meta
			name="description"
			content="Privacy-first spraak-naar-tekst met Limburgse dialect polijsten"
		/>
		<meta property="og:title" content="BABL" />
		<meta
			property="og:description"
			content="Privacy-first spraak-naar-tekst met Limburgse dialect polijsten"
		/>
		<meta property="og:type" content="website" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		<link rel="manifest" href="/manifest.json" />
		<script>
			(function () {
				var t = localStorage.getItem('babl-theme');
				var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
				if (t === 'light' || (t !== 'dark' && !prefersDark)) {
					document.documentElement.classList.add('light');
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
