<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1a2e"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </linearGradient>
    <linearGradient id="txt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="20%" stop-color="#10b981"/>
      <stop offset="42%" stop-color="#d4ff00"/>
      <stop offset="65%" stop-color="#f97316"/>
      <stop offset="85%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Glitch offset layers -->
  <text x="15" y="23" text-anchor="middle" font-family="'Impact','Arial Black',sans-serif" font-weight="900" font-size="22" fill="#d4ff00" opacity="0.3" letter-spacing="-1">B</text>
  <text x="17" y="22.5" text-anchor="middle" font-family="'Impact','Arial Black',sans-serif" font-weight="900" font-size="22" fill="#ea580c" opacity="0.25" letter-spacing="-1">B</text>
  <!-- Main letter -->
  <text x="16" y="23" text-anchor="middle" font-family="'Impact','Arial Black',sans-serif" font-weight="900" font-size="22" fill="url(#txt)" filter="url(#glow)" letter-spacing="-1">B</text>
</svg>
